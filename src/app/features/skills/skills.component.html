<section id="skills" class="section section-white">
  <div class="container">
    <h2 class="section-title">Skills & Expertise</h2>
    <p class="section-subtitle">Technologies and tools I work with</p>

    <div class="skills-grid">
      <div *ngFor="let category of skillCategories" class="skill-category">
        <div class="category-header">
          <span class="material-icons category-icon">{{ category.icon }}</span>
          <h3 class="category-title">{{ category.title }}</h3>
        </div>
        <ul class="skills-list">
          <li *ngFor="let skill of category.skills" class="skill-item">
            <span class="skill-bullet"></span>
            <span class="skill-name">{{ skill }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
