<header class="header" [class.scrolled]="isScrolled">
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <!-- Logo -->
        <div class="navbar-brand">
          <a (click)="scrollToSection('home')" class="logo">
            <span class="logo-text">Monisha</span>
          </a>
        </div>

        <!-- Desktop Navigation -->
        <ul class="navbar-menu desktop-menu">
          <li *ngFor="let link of navLinks" class="nav-item">
            <a (click)="scrollToSection(link.fragment)" class="nav-link">
              {{ link.label }}
            </a>
          </li>
        </ul>

        <!-- Mobile Menu Toggle -->
        <button
          class="mobile-menu-toggle"
          (click)="toggleMobileMenu()"
          [class.active]="isMobileMenuOpen"
          aria-label="Toggle mobile menu">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>

      <!-- Mobile Navigation -->
      <div class="mobile-menu" [class.show]="isMobileMenuOpen">
        <ul class="mobile-menu-list">
          <li *ngFor="let link of navLinks" class="mobile-nav-item">
            <a (click)="scrollToSection(link.fragment)" class="mobile-nav-link">
              {{ link.label }}
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
